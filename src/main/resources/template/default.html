<html>
<head>
    <link rel="stylesheet" href="{{service}}resources/vditor/dist/index.css?{{serverToken}}"/>
    <link rel="stylesheet" href="{{service}}resources/vditor/style.css?{{serverToken}}"/>
    <script src="{{service}}resources/vditor/dist/index.min.js?{{serverToken}}"></script>
    <script src="{{service}}resources/vditor/jquery-3.6.0.min.js?{{serverToken}}"></script>
    <style>
        /* 只读态保持内容可读，不沿用 Vditor 默认的半透明禁用视觉。 */
        #vditor.preview-readonly .vditor-wysiwyg pre.vditor-reset[contenteditable="false"],
        #vditor.preview-readonly .vditor-ir pre.vditor-reset[contenteditable="false"],
        #vditor.preview-readonly .vditor-sv[contenteditable="false"] {
            opacity: 1;
            cursor: default;
            caret-color: transparent;
            user-select: text;
            -webkit-user-select: text;
        }

        /* 只读态下不展示 IR 展开后的 Markdown 标记，避免点击标题后出现 ### 等前缀。 */
        #vditor.preview-readonly .vditor-ir__node--expand .vditor-ir__marker--heading,
        #vditor.preview-readonly .vditor-ir__node--expand .vditor-ir__marker--bi,
        #vditor.preview-readonly .vditor-ir__node--expand .vditor-ir__marker--link,
        #vditor.preview-readonly .vditor-ir__node--expand .vditor-ir__marker--title,
        #vditor.preview-readonly .vditor-ir__node--expand .vditor-ir__marker--bracket,
        #vditor.preview-readonly .vditor-ir__node--expand .vditor-ir__marker--paren,
        #vditor.preview-readonly .vditor-ir__node--expand .vditor-ir__marker--info,
        #vditor.preview-readonly .vditor-ir__node--expand[data-type="code-block"]:before,
        #vditor.preview-readonly .vditor-ir__node--expand[data-type="code-block"]:after,
        #vditor.preview-readonly .vditor-ir__node--expand[data-type="yaml-front-matter"]:before,
        #vditor.preview-readonly .vditor-ir__node--expand[data-type="yaml-front-matter"]:after,
        #vditor.preview-readonly .vditor-ir__node--expand[data-type="math-block"]:before,
        #vditor.preview-readonly .vditor-ir__node--expand[data-type="math-block"]:after {
            display: none !important;
            opacity: 0 !important;
        }
    </style>
</head>

</body>
<script>
    $.ajaxSettings.async = false;
    const userTemplate = "{{userTemplate}}" === "true";
    const fileUrl = "{{service}}markdownFile?file={{filePath}}&projectUrl={{projectUrl}}&projectName={{projectName}}&{{serverToken}}";
    const uploadUrl = "{{service}}uploadFile?file={{filePath}}&projectUrl={{projectUrl}}&projectName={{projectName}}&{{serverToken}}";
    const exportUrl = "{{service}}exportFile?file={{filePath}}&projectUrl={{projectUrl}}&projectName={{projectName}}&{{serverToken}}";
    const vditorCDN = "{{service}}resources/vditor";
    const vditorThemeCDN = userTemplate ? "{{service}}assets/vditor/content-theme" : "{{service}}resources/vditor/dist/css/content-theme";
    let initError = true;
    let fileValue = "";
    let saveTime = Date.now();
    const darcula = "{{darcula}}" === "true";
    const previewToolbarVisible = "{{previewToolbarVisible}}" === "true";
    const previewEditable = "{{previewEditable}}" === "true";
    const currentFilePath = decodeURIComponent("{{filePath}}");
    window.previewEditable = previewEditable;
    window.previewSyncDebug = false;
    /**
     * 仅在最近确实发生过用户滚动意图时，才允许把预览侧 scroll 解释为 USER_SCROLL。
     * 这样可以拦住渲染回流、模式切换和程序性 reveal 带来的伪滚动，避免它们污染宿主侧激活恢复状态。
     */
    const USER_SCROLL_INTENT_WINDOW_MS = 1200;
    /**
     * 仅在最近确实发生过用户选区意图时，才允许把 selectionchange 解释为稳定用户选区。
     * 这样可以过滤只读切换、DOM 重建和浏览器内部选区调整带来的噪声事件。
     */
    const USER_SELECTION_INTENT_WINDOW_MS = 1500;
    /**
     * selectionchange 需要在短时间内静默后再上报，避免拖拽选区和 DOM 抖动期间连续把中间态回写给宿主。
     */
    const SELECTION_STABILIZE_DELAY_MS = 140;
    /**
     * 程序性滚动基线的保护时间窗。
     * 在这个时间窗内，如果没有新的用户滚动意图，接近程序性 baseline 的 scroll 变化都视为程序性噪声。
     */
    const PROGRAMMATIC_SCROLL_GUARD_WINDOW_MS = 1200;
    /**
     * 程序性滚动基线的 scrollTop 近似容差。
     * 允许浏览器布局收敛时出现少量像素级漂移，但不把它误判成新的用户滚动。
     */
    const PROGRAMMATIC_SCROLL_TOP_TOLERANCE = 6;
    const previewSyncState = {
        currentFilePath: currentFilePath,
        lastAppliedContentVersion: 0,
        lastRenderedContentVersion: 0,
        applyingMarkdown: false,
        dirty: false,
        totalMarkdownLineCount: 1,
        sourceMapBlocks: [],
        blockMappings: [],
        previewScrollListenerBound: false,
        previewSelectionListenerBound: false,
        lastViewportAnchorLine: -1,
        suppressScrollEventUntil: 0,
        suppressSyntheticViewportUntil: 0,
        lastUserScrollIntentAt: 0,
        lastUserScrollIntentSource: "",
        lastUserSelectionIntentAt: 0,
        lastUserSelectionIntentSource: "",
        lastEmittedSelectionSignature: "",
        programmaticViewportEpoch: 0,
        skipNextViewportInProgrammaticEpoch: false,
        lastProgrammaticScrollTop: null,
        lastProgrammaticScrollAt: 0,
        lastProgrammaticScrollReason: "",
        viewportThrottleTimer: 0,
        selectionThrottleTimer: 0
    };

    function debugPreviewSync(message, detail) {
        if (!window.previewSyncDebug) {
            return;
        }
        if (typeof console !== "undefined" && console.info) {
            if (typeof detail === "undefined") {
                console.info("[preview-sync] " + message);
            } else {
                console.info("[preview-sync] " + message, detail);
            }
        }
    }

    /**
     * 记录最近一次可能触发真实预览滚动的用户输入。
     * 这里只记录“滚轮、触摸、滚动热键、滚动容器按下”等会导致视口变化的动作，不把程序性滚动混进来。
     */
    function markUserScrollIntent(source) {
        previewSyncState.lastUserScrollIntentAt = Date.now();
        previewSyncState.lastUserScrollIntentSource = source || "unknown";
        debugPreviewSync("mark user scroll intent", {
            source: previewSyncState.lastUserScrollIntentSource,
            at: previewSyncState.lastUserScrollIntentAt
        });
    }

    /**
     * 清理最近一次用户滚动意图。
     * 当后续滚动明确来自程序性 reveal、模式切换或重新渲染时，需要主动失效旧意图，避免程序性滚动误借用旧用户输入资格上报。
     */
    function clearUserScrollIntent(reason) {
        if (previewSyncState.lastUserScrollIntentAt <= 0) {
            return;
        }
        debugPreviewSync("clear user scroll intent", {
            reason: reason,
            source: previewSyncState.lastUserScrollIntentSource,
            at: previewSyncState.lastUserScrollIntentAt
        });
        previewSyncState.lastUserScrollIntentAt = 0;
        previewSyncState.lastUserScrollIntentSource = "";
    }

    /**
     * 判断当前 scroll 事件是否仍可被视为“紧随真实用户输入之后”的滚动。
     * 超过短时间窗后就不再承认这次资格，防止布局稳定过程里迟到的程序性滚动混入 USER_SCROLL。
     */
    function hasRecentUserScrollIntent(now) {
        return previewSyncState.lastUserScrollIntentAt > 0
            && now - previewSyncState.lastUserScrollIntentAt <= USER_SCROLL_INTENT_WINDOW_MS;
    }

    /**
     * 记录最近一次可能触发用户选区变化的输入。
     * 这里只承认鼠标按下、触摸开始和带 Shift 的导航按键，避免把普通焦点切换误当成真实选区意图。
     */
    function markUserSelectionIntent(source) {
        previewSyncState.lastUserSelectionIntentAt = Date.now();
        previewSyncState.lastUserSelectionIntentSource = source || "unknown";
        debugPreviewSync("mark user selection intent", {
            source: previewSyncState.lastUserSelectionIntentSource,
            at: previewSyncState.lastUserSelectionIntentAt
        });
    }

    /**
     * 判断当前 selectionchange 是否仍然有资格被视为“紧随真实用户选区输入之后”的稳定选区。
     */
    function hasRecentUserSelectionIntent(now) {
        return previewSyncState.lastUserSelectionIntentAt > 0
            && now - previewSyncState.lastUserSelectionIntentAt <= USER_SELECTION_INTENT_WINDOW_MS;
    }

    /**
     * 进入新一轮程序性滚动 epoch，并记录当前程序性滚动基线。
     * 该 epoch 用于在渲染、模式切换和 reveal 后过滤掉首批非用户滚动事件。
     */
    function beginProgrammaticViewportEpoch(reason, explicitScrollTop) {
        const container = getPreviewScrollContainer();
        previewSyncState.programmaticViewportEpoch += 1;
        previewSyncState.skipNextViewportInProgrammaticEpoch = true;
        previewSyncState.lastProgrammaticScrollAt = Date.now();
        previewSyncState.lastProgrammaticScrollReason = reason || "programmatic";
        if (typeof explicitScrollTop === "number") {
            previewSyncState.lastProgrammaticScrollTop = explicitScrollTop;
        } else if (container) {
            previewSyncState.lastProgrammaticScrollTop = container.scrollTop;
        } else {
            previewSyncState.lastProgrammaticScrollTop = null;
        }
        debugPreviewSync("begin programmatic viewport epoch", {
            epoch: previewSyncState.programmaticViewportEpoch,
            reason: previewSyncState.lastProgrammaticScrollReason,
            scrollTop: previewSyncState.lastProgrammaticScrollTop
        });
    }

    /**
     * 判断当前 scroll 事件是否仍落在程序性滚动基线附近。
     * 如果是，则优先把它视为布局收敛或程序性滚动的后续噪声，而不是新的用户滚动。
     */
    function isNearProgrammaticScrollBaseline(now, container) {
        if (!container || previewSyncState.lastProgrammaticScrollTop === null) {
            return false;
        }
        if (now - previewSyncState.lastProgrammaticScrollAt > PROGRAMMATIC_SCROLL_GUARD_WINDOW_MS) {
            return false;
        }
        return Math.abs(container.scrollTop - previewSyncState.lastProgrammaticScrollTop) <= PROGRAMMATIC_SCROLL_TOP_TOLERANCE;
    }

    window.onload = function () {
        if (userTemplate) {
            $('<link>').appendTo('head').attr({
                type: 'text/css',
                rel: 'stylesheet',
                href: '{{service}}assets/vditor/userStyle.css'
            });
        }
        // 工具栏节点由 Vditor 初始化后提供，这里只在节点存在时追加扩展内容。
        appendSyncedTip(!initError);
        initToolbarExtensions();
        window.setPreviewToolbarVisible(previewToolbarVisible);
        document.addEventListener('mousedown', (event) => {
            if (event.button === 2) {
                if (window.getSelection().isCollapsed) {
                    document.onselectstart =function(){
                        return false;
                    }
                    setTimeout(() => {
                        document.onselectstart =function(){
                            return true;
                        }
                    }, 0);
                }
            }
        });
        /*const contentMenuStyle = document.getElementById("contentMenu").style;
        const notepad = document.getElementsByClassName("vditor-content")[0];
        notepad.addEventListener('contextmenu', function(e) {
            e.preventDefault();
            contentMenuStyle.top =  e.clientY+ "px";
            contentMenuStyle.left = e.clientX + "px";
            contentMenuStyle.display = "block"
            contentMenuStyle.opacity = "1";
        }, false);
        notepad.addEventListener('click', function(e) {
            contentMenuStyle.opacity = "0";
            setTimeout(function() {
                contentMenuStyle.display = "none";
            }, 501);
        }, false);*/
    }

    function editBlur(md,format) {
        if (!window.previewEditable) {
            return;
        }
        if (initError) {
            vditor.tip("Get init file request error,Don't save.", 1000);
            return;
        }
        if (!format && md === fileValue) {
            return;
        }
        $.post(fileUrl, {"value": md}, function (data) {
            if (data.success === false) {
                vditor.tip("Failed to save file:" + data.message, 0);
            } else {
                fileValue = md;
                syncedTip(true, data)
                saveTime = Date.now() + 5000;
                setPreviewDirtyState(false, "user");
            }
        }).fail(function () {
            vditor.tip("Save file request error", 0);
        })
    }

    function editFocus(md) {
        if (Date.now() <= saveTime) {
            return;
        }
        $.get(fileUrl, function (data) {
            if (md !== data) {
                vditor.setValue(data);
                fileValue = vditor.getValue();
                syncedTip(true, data)
                setPreviewDirtyState(false, "programmatic");
                schedulePreviewSyncArtifactsRebuild("editFocus");
            }
        }).fail(function () {
            vditor.tip("Get file request error", 0);
        })
    }

    function editInput(md) {
        if (!window.previewEditable) {
            return;
        }
        if (previewSyncState.applyingMarkdown) {
            return;
        }
        syncedTip(false, md)
        setPreviewDirtyState(md !== fileValue, "user");
    }

    function initValue() {
        let value = "";
        $.get(fileUrl, function (data) {
            value = data;
            initError = false;
        }).fail(function () {
            vditor.tip("Get file request error", 0);
            value = "Get file request error,Please reload";
            initError = true;
        })
        return value;
    }

    function appendSyncedTip(isSynced) {
        const toolbarElement = getToolbarElement();
        if (!toolbarElement) {
            return;
        }
        let synced = document.createElement("span");
        synced.className = "vditor-counter vditor-tooltipped vditor-tooltipped__nw";
        synced.id = "syncedTip";
        synced.title = "Automatic synchronization after losing focus";
        synced.innerHTML = isSynced ? "Synced" : "Not Synced";
        toolbarElement.appendChild(synced);
    }

    function syncedTip(isSynced, md) {
        let syncedElement = document.getElementById("syncedTip");
        if (!syncedElement) {
            return;
        }
        if (!initError && (isSynced || md === fileValue)) {
            syncedElement.innerHTML = "Synced";
        } else {
            syncedElement.innerHTML = "Not Synced";
        }

    }

    function getToolbarElement() {
        if (!vditor || !vditor.vditor || !vditor.vditor.toolbar) {
            return null;
        }
        return vditor.vditor.toolbar.element || null;
    }

    /**
     * 获取 Markdown Editor 预览根节点，用于承载项目自管的只读样式。
     */
    function getPreviewRootElement() {
        return document.getElementById("vditor");
    }

    /**
     * 统一构造并发送预览页同步消息。
     * 页面侧所有 ready、rendered、dirty、viewport 和 selection 事件都通过同一 JSON 通道回传宿主。
     */
    function emitPreviewSyncMessage(type, payload, source, contentVersion) {
        if (typeof window.previewSyncBridge !== "function") {
            return;
        }
        const message = {
            type: type,
            filePath: previewSyncState.currentFilePath,
            contentVersion: typeof contentVersion === "number" ? contentVersion : previewSyncState.lastRenderedContentVersion,
            timestamp: Date.now(),
            source: source || "programmatic",
            payload: payload || {}
        };
        window.previewSyncBridge(JSON.stringify(message));
    }

    /**
     * 维护预览页本地脏状态，并在状态变化时回传宿主。
     * 宿主据此在预览页未保存本地编辑期间暂停主动覆盖内容，避免双端编辑冲突。
     */
    function setPreviewDirtyState(dirty, source) {
        const nextDirty = !!dirty;
        if (previewSyncState.dirty === nextDirty) {
            return;
        }
        previewSyncState.dirty = nextDirty;
        emitPreviewSyncMessage("previewDirtyChanged", {dirty: nextDirty}, source || "programmatic");
    }

    /**
     * 获取当前 Vditor 模式对应的可编辑节点。
     * 只读态需要对当前模式重新施加 contenteditable 和视觉控制。
     */
    function getCurrentModeElement() {
        if (!vditor || !vditor.vditor || !vditor.vditor.currentMode) {
            return null;
        }
        const currentMode = vditor.vditor.currentMode;
        const currentEditor = vditor.vditor[currentMode];
        if (!currentEditor) {
            return null;
        }
        return currentEditor.element || null;
    }

    /**
     * 获取当前模式下实际参与滚动的预览容器。
     * 当前项目在三种模式下都以内层编辑容器作为滚动主体，不能直接假设是 window 滚动。
     */
    function getPreviewScrollContainer() {
        return getCurrentModeElement();
    }

    /**
     * 获取当前模式下可用于建立源码锚点映射的块级 DOM 节点列表。
     * `wysiwyg` 和 `ir` 模式天然具备顶层块节点；`sv` 模式先退化为整个源码容器一个大块，由按行估算滚动兜底。
     */
    function getCurrentModeBlockElements() {
        const currentModeElement = getCurrentModeElement();
        if (!currentModeElement || !vditor || !vditor.vditor) {
            return [];
        }
        const currentMode = vditor.vditor.currentMode;
        if (currentMode === "sv") {
            const wholeSourceElement = currentModeElement.querySelector("[data-block]") || currentModeElement;
            return wholeSourceElement ? [wholeSourceElement] : [];
        }
        return Array.from(currentModeElement.children).filter(function (element) {
            return element.nodeType === Node.ELEMENT_NODE;
        });
    }

    function isBlankMarkdownLine(line) {
        return /^\s*$/.test(line);
    }

    function isFenceStart(line) {
        const match = line.match(/^ {0,3}(`{3,}|~{3,})/);
        if (!match) {
            return null;
        }
        return match[1];
    }

    function isHeadingLine(line) {
        return /^ {0,3}#{1,6}\s+/.test(line);
    }

    function isHorizontalRuleLine(line) {
        return /^ {0,3}(?:([-*_])\s*){3,}$/.test(line);
    }

    function isTableDelimiterLine(line) {
        return /^\s*\|?(?:\s*:?-+:?\s*\|)+\s*:?-+:?\s*\|?\s*$/.test(line);
    }

    function looksLikeTableHeaderLine(line) {
        return /\|/.test(line);
    }

    function isBlockquoteLine(line) {
        return /^ {0,3}> ?/.test(line);
    }

    function isListStartLine(line) {
        return /^ {0,3}(?:[*+-]|\d+[.)])\s+/.test(line);
    }

    /**
     * 基于 Markdown 原文做轻量块扫描，生成顶层块的源码行范围。
     * 这里不追求完整语法树级别精度，而是优先为滚动联动提供稳定、顺序一致的块级行号锚点。
     */
    function parseMarkdownBlocks(markdown) {
        const lines = markdown.split(/\r\n|\r|\n/);
        const blocks = [];
        let lineIndex = 0;
        while (lineIndex < lines.length) {
            if (isBlankMarkdownLine(lines[lineIndex])) {
                lineIndex += 1;
                continue;
            }

            const fenceMarker = isFenceStart(lines[lineIndex]);
            if (fenceMarker) {
                const blockStart = lineIndex;
                lineIndex += 1;
                while (lineIndex < lines.length && !new RegExp("^ {0,3}" + fenceMarker[0] + "{" + fenceMarker.length + ",}\\s*$").test(lines[lineIndex])) {
                    lineIndex += 1;
                }
                if (lineIndex < lines.length) {
                    lineIndex += 1;
                }
                blocks.push({startLine: blockStart, endLine: Math.max(blockStart, lineIndex - 1)});
                continue;
            }

            if (isHeadingLine(lines[lineIndex]) || isHorizontalRuleLine(lines[lineIndex])) {
                blocks.push({startLine: lineIndex, endLine: lineIndex});
                lineIndex += 1;
                continue;
            }

            if (lineIndex + 1 < lines.length && looksLikeTableHeaderLine(lines[lineIndex]) && isTableDelimiterLine(lines[lineIndex + 1])) {
                const blockStart = lineIndex;
                lineIndex += 2;
                while (lineIndex < lines.length && /\|/.test(lines[lineIndex]) && !isBlankMarkdownLine(lines[lineIndex])) {
                    lineIndex += 1;
                }
                blocks.push({startLine: blockStart, endLine: Math.max(blockStart, lineIndex - 1)});
                continue;
            }

            if (isBlockquoteLine(lines[lineIndex])) {
                const blockStart = lineIndex;
                lineIndex += 1;
                while (lineIndex < lines.length) {
                    if (isBlankMarkdownLine(lines[lineIndex])) {
                        if (lineIndex + 1 < lines.length && isBlockquoteLine(lines[lineIndex + 1])) {
                            lineIndex += 1;
                            continue;
                        }
                        break;
                    }
                    if (!isBlockquoteLine(lines[lineIndex])) {
                        break;
                    }
                    lineIndex += 1;
                }
                blocks.push({startLine: blockStart, endLine: Math.max(blockStart, lineIndex - 1)});
                continue;
            }

            if (isListStartLine(lines[lineIndex])) {
                const blockStart = lineIndex;
                lineIndex += 1;
                while (lineIndex < lines.length) {
                    if (isBlankMarkdownLine(lines[lineIndex])) {
                        break;
                    }
                    if (isListStartLine(lines[lineIndex]) || /^ {2,}\S/.test(lines[lineIndex])) {
                        lineIndex += 1;
                        continue;
                    }
                    if (isFenceStart(lines[lineIndex])) {
                        break;
                    }
                    lineIndex += 1;
                }
                blocks.push({startLine: blockStart, endLine: Math.max(blockStart, lineIndex - 1)});
                continue;
            }

            const blockStart = lineIndex;
            lineIndex += 1;
            while (lineIndex < lines.length && !isBlankMarkdownLine(lines[lineIndex])) {
                if (isFenceStart(lines[lineIndex]) || isHeadingLine(lines[lineIndex]) || isHorizontalRuleLine(lines[lineIndex]) ||
                    isBlockquoteLine(lines[lineIndex]) || isListStartLine(lines[lineIndex])) {
                    break;
                }
                if (lineIndex + 1 < lines.length && looksLikeTableHeaderLine(lines[lineIndex]) && isTableDelimiterLine(lines[lineIndex + 1])) {
                    break;
                }
                lineIndex += 1;
            }
            blocks.push({startLine: blockStart, endLine: Math.max(blockStart, lineIndex - 1)});
        }
        return blocks;
    }

    function measureElementTop(container, element) {
        const containerRect = container.getBoundingClientRect();
        const elementRect = element.getBoundingClientRect();
        return container.scrollTop + elementRect.top - containerRect.top;
    }

    function resolveFallbackLineHeight(container) {
        if (!container) {
            return 24;
        }
        const computedStyle = window.getComputedStyle(container);
        const lineHeight = parseFloat(computedStyle.lineHeight);
        if (!Number.isNaN(lineHeight) && lineHeight > 0) {
            return lineHeight;
        }
        return 24;
    }

    /**
     * `sv` 模式下优先使用“可滚动总高度 / Markdown 总行数”估算每行纵向跨度。
     * 这样比单纯依赖 CSS 行高更贴近真实滚动距离，能减少长文档中的累计误差。
     */
    function resolveSvLineHeight(container) {
        if (!container) {
            return 24;
        }
        const fallbackLineHeight = resolveFallbackLineHeight(container);
        const totalLineCount = Math.max(1, previewSyncState.totalMarkdownLineCount || 1);
        const maxScrollTop = Math.max(0, container.scrollHeight - container.clientHeight);
        if (totalLineCount <= 1 || maxScrollTop <= 0) {
            return fallbackLineHeight;
        }
        return Math.max(fallbackLineHeight, maxScrollTop / Math.max(1, totalLineCount - 1));
    }

    function resolveContainerPaddingTop(container) {
        if (!container) {
            return 0;
        }
        const computedStyle = window.getComputedStyle(container);
        const paddingTop = parseFloat(computedStyle.paddingTop);
        return Number.isNaN(paddingTop) ? 0 : Math.max(0, paddingTop);
    }

    /**
     * 根据当前模式和 Markdown 原文重建块级源码锚点与滚动映射。
     * `wysiwyg/ir` 走块级 DOM 顺序绑定；`sv` 先退化为按行高估算滚动，不阻塞整体联动闭环。
     */
    function rebuildPreviewSyncArtifacts() {
        if (!vditor || !vditor.vditor) {
            return;
        }
        const currentMode = vditor.vditor.currentMode;
        const currentModeElement = getCurrentModeElement();
        const blockElements = getCurrentModeBlockElements();
        const blocks = previewSyncState.sourceMapBlocks.length > 0 ? previewSyncState.sourceMapBlocks : parseMarkdownBlocks(vditor.getValue());
        previewSyncState.totalMarkdownLineCount = Math.max(1, vditor.getValue().split(/\r\n|\r|\n/).length);
        previewSyncState.blockMappings = [];
        if (!currentModeElement) {
            return;
        }
        if (currentMode === "sv") {
            if (blockElements.length > 0) {
                blockElements[0].dataset.sourceId = "source-block-all";
                blockElements[0].dataset.sourceLineStart = "0";
                blockElements[0].dataset.sourceLineEnd = String(Math.max(0, blocks.length === 0 ? 0 : blocks[blocks.length - 1].endLine));
            }
            return;
        }
        const blockCount = Math.min(blocks.length, blockElements.length);
        for (let index = 0; index < blockCount; index += 1) {
            const block = blocks[index];
            const element = blockElements[index];
            const sourceId = "source-block-" + index;
            element.dataset.sourceId = sourceId;
            element.dataset.sourceLineStart = String(block.startLine);
            element.dataset.sourceLineEnd = String(block.endLine);
            const blockMapping = {
                sourceId: sourceId,
                blockType: block.blockType || "GENERIC",
                startLine: block.startLine,
                endLine: block.endLine,
                rowMappings: block.rowMappings || [],
                element: element
            };
            previewSyncState.blockMappings.push(blockMapping);
            bindTableRowMappingsIfNeeded(element, blockMapping);
        }
    }

    function bindTableRowMappingsIfNeeded(element, blockMapping) {
        if (!element || !blockMapping || blockMapping.blockType !== "TABLE") {
            return;
        }
        const rowMappings = Array.isArray(blockMapping.rowMappings) ? blockMapping.rowMappings : [];
        if (rowMappings.length === 0) {
            return;
        }
        const rowElements = Array.from(element.querySelectorAll("thead tr, tbody tr, tr"));
        const rowCount = Math.min(rowElements.length, rowMappings.length);
        for (let index = 0; index < rowCount; index += 1) {
            const rowElement = rowElements[index];
            const rowMapping = rowMappings[index];
            rowElement.dataset.sourceId = blockMapping.sourceId + "-row-" + index;
            rowElement.dataset.sourceLineStart = String(rowMapping.startLine);
            rowElement.dataset.sourceLineEnd = String(rowMapping.endLine);
            rowElement.dataset.sourceRowIndex = String(index);
        }
    }

    function schedulePreviewSyncArtifactsRebuild(reason) {
        setTimeout(function () {
            rebuildPreviewSyncArtifacts();
        }, 0);
    }

    function resolveScrollTopForLine(line, topRatio) {
        const container = getPreviewScrollContainer();
        if (!container) {
            return null;
        }
        const safeTopRatio = typeof topRatio === "number" ? Math.max(0, Math.min(1, topRatio)) : 0;
        if (!vditor || !vditor.vditor || vditor.vditor.currentMode === "sv") {
            const lineHeight = resolveSvLineHeight(container);
            const paddingTop = resolveContainerPaddingTop(container);
            const maxScrollTop = Math.max(0, container.scrollHeight - container.clientHeight);
            const targetScrollTop = paddingTop + line * lineHeight - container.clientHeight * safeTopRatio;
            return Math.max(0, Math.min(maxScrollTop, targetScrollTop));
        }
        if (previewSyncState.blockMappings.length === 0) {
            return 0;
        }
        let currentBlock = previewSyncState.blockMappings[0];
        for (let index = 0; index < previewSyncState.blockMappings.length; index += 1) {
            const block = previewSyncState.blockMappings[index];
            if (line < block.startLine) {
                break;
            }
            currentBlock = block;
            if (line <= block.endLine) {
                break;
            }
        }
        const currentIndex = previewSyncState.blockMappings.indexOf(currentBlock);
        const currentY = measureElementTop(container, currentBlock.element);
        const nextBlock = currentIndex + 1 < previewSyncState.blockMappings.length ? previewSyncState.blockMappings[currentIndex + 1] : null;
        const nextY = nextBlock ? measureElementTop(container, nextBlock.element) : currentY + Math.max(currentBlock.element.offsetHeight, resolveFallbackLineHeight(container));
        const blockLineCount = Math.max(1, currentBlock.endLine - currentBlock.startLine + 1);
        const blockRatio = Math.max(0, Math.min(1, (line - currentBlock.startLine) / blockLineCount));
        const targetY = currentY + (nextY - currentY) * blockRatio;
        return Math.max(0, targetY - container.clientHeight * safeTopRatio);
    }

    /**
     * 按源码逻辑行驱动当前预览模式滚动到对应语义位置附近。
     * 这里优先使用块级锚点映射；`sv` 模式退化为按行高估算，保证至少具备基础联动能力。
     */
    function revealSourceLine(line, topRatio, reason) {
        const container = getPreviewScrollContainer();
        const targetScrollTop = resolveScrollTopForLine(line, topRatio);
        if (!container || targetScrollTop === null) {
            return;
        }
        clearUserScrollIntent("revealSourceLine");
        beginProgrammaticViewportEpoch(reason || "revealSourceLine", targetScrollTop);
        previewSyncState.suppressScrollEventUntil = Date.now() + 280;
        container.scrollTop = targetScrollTop;
    }

    function findSourceAnchorElement(node) {
        let currentNode = node;
        while (currentNode) {
            if (currentNode.nodeType === Node.ELEMENT_NODE && currentNode.dataset && currentNode.dataset.sourceLineStart) {
                return currentNode;
            }
            currentNode = currentNode.parentNode;
        }
        return null;
    }

    function collectViewportAnchor() {
        const container = getPreviewScrollContainer();
        if (!container) {
            return null;
        }
        if (container.scrollHeight <= container.clientHeight + 2) {
            return {
                anchorLine: previewSyncState.lastViewportAnchorLine,
                sourceId: null,
                anchorKind: "NO_SCROLL_SYNTHETIC",
                suppressEmit: true
            };
        }
        if (!vditor || !vditor.vditor || vditor.vditor.currentMode === "sv") {
            const lineHeight = resolveSvLineHeight(container);
            const paddingTop = resolveContainerPaddingTop(container);
            const maxLine = Math.max(0, (previewSyncState.totalMarkdownLineCount || 1) - 1);
            return {
                anchorLine: Math.max(0, Math.min(maxLine, Math.round((container.scrollTop + container.clientHeight / 2 - paddingTop) / lineHeight))),
                sourceId: null,
                anchorKind: "USER_SCROLL"
            };
        }
        if (previewSyncState.blockMappings.length === 0) {
            return null;
        }
        const centerY = container.scrollTop + container.clientHeight / 2;
        let currentBlock = previewSyncState.blockMappings[0];
        for (let index = 0; index < previewSyncState.blockMappings.length; index += 1) {
            const block = previewSyncState.blockMappings[index];
            const blockY = measureElementTop(container, block.element);
            if (centerY >= blockY) {
                currentBlock = block;
                continue;
            }
            break;
        }
        const currentIndex = previewSyncState.blockMappings.indexOf(currentBlock);
        const currentY = measureElementTop(container, currentBlock.element);
        const nextBlock = currentIndex + 1 < previewSyncState.blockMappings.length ? previewSyncState.blockMappings[currentIndex + 1] : null;
        const nextY = nextBlock ? measureElementTop(container, nextBlock.element) : currentY + Math.max(currentBlock.element.offsetHeight, resolveFallbackLineHeight(container));
        if (currentBlock.blockType === "TABLE") {
            const tableRowAnchor = collectTableViewportAnchor(currentBlock, container, centerY);
            if (tableRowAnchor) {
                return tableRowAnchor;
            }
        }
        const blockHeight = Math.max(1, nextY - currentY);
        const blockRatio = Math.max(0, Math.min(1, (centerY - currentY) / blockHeight));
        const blockLineCount = Math.max(1, currentBlock.endLine - currentBlock.startLine + 1);
        return {
            anchorLine: Math.max(currentBlock.startLine, Math.round(currentBlock.startLine + (blockLineCount - 1) * blockRatio)),
            sourceId: currentBlock.sourceId,
            anchorKind: "USER_SCROLL"
        };
    }

    function collectTableViewportAnchor(blockMapping, container, centerY) {
        if (!blockMapping || !blockMapping.element) {
            return null;
        }
        const rowElements = Array.from(blockMapping.element.querySelectorAll("[data-source-row-index]"));
        if (rowElements.length === 0) {
            return null;
        }
        let closestRowElement = rowElements[0];
        let closestDistance = Math.abs(centerY - measureElementTop(container, closestRowElement));
        rowElements.forEach(function (rowElement) {
            const distance = Math.abs(centerY - measureElementTop(container, rowElement));
            if (distance < closestDistance) {
                closestDistance = distance;
                closestRowElement = rowElement;
            }
        });
        return {
            anchorLine: parseInt(closestRowElement.dataset.sourceLineStart, 10),
            sourceId: closestRowElement.dataset.sourceId || blockMapping.sourceId,
            anchorKind: "USER_SCROLL"
        };
    }

    function emitPreviewViewportChanged() {
        const now = Date.now();
        const container = getPreviewScrollContainer();
        if (now < previewSyncState.suppressScrollEventUntil) {
            debugPreviewSync("skip viewport emit by suppressScrollEventUntil");
            return;
        }
        if (now < previewSyncState.suppressSyntheticViewportUntil) {
            debugPreviewSync("skip viewport emit by suppressSyntheticViewportUntil");
            return;
        }
        if (previewSyncState.skipNextViewportInProgrammaticEpoch) {
            previewSyncState.skipNextViewportInProgrammaticEpoch = false;
            debugPreviewSync("skip viewport emit by first programmatic epoch event", {
                epoch: previewSyncState.programmaticViewportEpoch,
                reason: previewSyncState.lastProgrammaticScrollReason
            });
            return;
        }
        if (isNearProgrammaticScrollBaseline(now, container) && !hasRecentUserScrollIntent(now)) {
            debugPreviewSync("skip viewport emit by programmatic scroll baseline", {
                epoch: previewSyncState.programmaticViewportEpoch,
                reason: previewSyncState.lastProgrammaticScrollReason,
                scrollTop: container ? container.scrollTop : null,
                baseline: previewSyncState.lastProgrammaticScrollTop
            });
            return;
        }
        if (!hasRecentUserScrollIntent(now)) {
            debugPreviewSync("skip viewport emit by missing recent user scroll intent", {
                lastUserScrollIntentAt: previewSyncState.lastUserScrollIntentAt,
                lastUserScrollIntentSource: previewSyncState.lastUserScrollIntentSource,
                now: now
            });
            return;
        }
        const anchor = collectViewportAnchor();
        if (!anchor || anchor.suppressEmit || anchor.anchorLine === previewSyncState.lastViewportAnchorLine) {
            debugPreviewSync("skip viewport emit by empty/same anchor", anchor);
            return;
        }
        previewSyncState.lastViewportAnchorLine = anchor.anchorLine;
        debugPreviewSync("emit viewport changed", anchor);
        emitPreviewSyncMessage("previewViewportChanged", {
            anchorLine: anchor.anchorLine,
            sourceId: anchor.sourceId,
            anchorKind: anchor.anchorKind || "USER_SCROLL"
        }, "user");
    }

    function emitPreviewSelectionChanged() {
        const now = Date.now();
        const selection = window.getSelection();
        if (!selection || selection.rangeCount === 0 || selection.isCollapsed) {
            debugPreviewSync("emit selection cleared");
            if (previewSyncState.lastEmittedSelectionSignature !== "__cleared__") {
                previewSyncState.lastEmittedSelectionSignature = "__cleared__";
                emitPreviewSyncMessage("previewSelectionCleared", {}, "user");
            } else {
                debugPreviewSync("skip selection cleared by duplicate clear");
            }
            return;
        }
        if (!hasRecentUserSelectionIntent(now)) {
            debugPreviewSync("skip selection changed by missing recent user selection intent", {
                lastUserSelectionIntentAt: previewSyncState.lastUserSelectionIntentAt,
                lastUserSelectionIntentSource: previewSyncState.lastUserSelectionIntentSource,
                now: now
            });
            return;
        }
        const previewRootElement = getPreviewRootElement();
        const startContainer = selection.getRangeAt(0).startContainer;
        const endContainer = selection.getRangeAt(0).endContainer;
        if (!previewRootElement.contains(startContainer) || !previewRootElement.contains(endContainer)) {
            debugPreviewSync("emit selection cleared by out-of-root");
            if (previewSyncState.lastEmittedSelectionSignature !== "__cleared__") {
                previewSyncState.lastEmittedSelectionSignature = "__cleared__";
                emitPreviewSyncMessage("previewSelectionCleared", {}, "user");
            } else {
                debugPreviewSync("skip selection cleared by duplicate clear");
            }
            return;
        }
        const startAnchor = findSourceAnchorElement(startContainer);
        const endAnchor = findSourceAnchorElement(endContainer);
        if (!startAnchor || !endAnchor) {
            debugPreviewSync("emit selection cleared by missing anchor");
            if (previewSyncState.lastEmittedSelectionSignature !== "__cleared__") {
                previewSyncState.lastEmittedSelectionSignature = "__cleared__";
                emitPreviewSyncMessage("previewSelectionCleared", {}, "user");
            } else {
                debugPreviewSync("skip selection cleared by duplicate clear");
            }
            return;
        }
        const selectionSignature = [
            startAnchor.dataset.sourceLineStart,
            endAnchor.dataset.sourceLineEnd,
            selection.toString().slice(0, 120)
        ].join("|");
        if (selectionSignature === previewSyncState.lastEmittedSelectionSignature) {
            debugPreviewSync("skip selection changed by duplicate signature", {
                signature: selectionSignature
            });
            return;
        }
        previewSyncState.lastEmittedSelectionSignature = selectionSignature;
        debugPreviewSync("emit selection changed", {
            startLine: parseInt(startAnchor.dataset.sourceLineStart, 10),
            endLine: parseInt(endAnchor.dataset.sourceLineEnd, 10)
        });
        emitPreviewSyncMessage("previewSelectionChanged", {
            startLine: parseInt(startAnchor.dataset.sourceLineStart, 10),
            endLine: parseInt(endAnchor.dataset.sourceLineEnd, 10),
            sourceId: startAnchor.dataset.sourceId || null,
            anchorKind: "USER_SELECTION",
            selectedTextPreview: selection.toString().slice(0, 120)
        }, "user");
    }

    function bindPreviewSyncListeners() {
        if (!previewSyncState.previewScrollListenerBound) {
            previewSyncState.previewScrollListenerBound = true;
            document.addEventListener("scroll", function (event) {
                const container = getPreviewScrollContainer();
                if (!container || event.target !== container) {
                    return;
                }
                clearTimeout(previewSyncState.viewportThrottleTimer);
                previewSyncState.viewportThrottleTimer = setTimeout(function () {
                    emitPreviewViewportChanged();
                }, 80);
            }, true);
            document.addEventListener("wheel", function () {
                markUserScrollIntent("wheel");
            }, {capture: true, passive: true});
            document.addEventListener("touchmove", function () {
                markUserScrollIntent("touchmove");
            }, {capture: true, passive: true});
            document.addEventListener("keydown", function (event) {
                if (!event) {
                    return;
                }
                const scrollKeys = ["ArrowUp", "ArrowDown", "PageUp", "PageDown", "Home", "End", " "];
                if (scrollKeys.indexOf(event.key) >= 0) {
                    markUserScrollIntent("keydown:" + event.key);
                }
                if (event.shiftKey && ["ArrowUp", "ArrowDown", "ArrowLeft", "ArrowRight", "Home", "End", "PageUp", "PageDown"].indexOf(event.key) >= 0) {
                    markUserSelectionIntent("keydown-shift:" + event.key);
                }
            }, true);
            document.addEventListener("mousedown", function (event) {
                const container = getPreviewScrollContainer();
                if (!container || !event || event.button !== 0) {
                    return;
                }
                markUserSelectionIntent("mousedown");
                if (event.target === container) {
                    markUserScrollIntent("mousedown:container");
                }
            }, true);
            document.addEventListener("touchstart", function () {
                markUserSelectionIntent("touchstart");
                markUserScrollIntent("touchstart");
            }, {capture: true, passive: true});
        }
        if (!previewSyncState.previewSelectionListenerBound) {
            previewSyncState.previewSelectionListenerBound = true;
            document.addEventListener("selectionchange", function () {
                clearTimeout(previewSyncState.selectionThrottleTimer);
                previewSyncState.selectionThrottleTimer = setTimeout(function () {
                    emitPreviewSelectionChanged();
                }, SELECTION_STABILIZE_DELAY_MS);
            });
        }
    }

    function schedulePreviewRendered(contentVersion) {
        setTimeout(function () {
            clearUserScrollIntent("schedulePreviewRendered");
            beginProgrammaticViewportEpoch("schedulePreviewRendered");
            previewSyncState.suppressSyntheticViewportUntil = Date.now() + 220;
            debugPreviewSync("schedule preview rendered", {contentVersion: contentVersion});
            schedulePreviewSyncArtifactsRebuild("rendered");
            previewSyncState.lastRenderedContentVersion = contentVersion;
            emitPreviewSyncMessage("previewRendered", {}, "programmatic", contentVersion);
        }, 0);
    }

    function applyMarkdownFromHost(message) {
        if (!message || !message.payload) {
            return;
        }
        const markdown = typeof message.payload.markdown === "string" ? message.payload.markdown : "";
        const contentVersion = typeof message.contentVersion === "number" ? message.contentVersion : 0;
        previewSyncState.sourceMapBlocks = Array.isArray(message.payload.sourceMap) ? message.payload.sourceMap : [];
        if (previewSyncState.dirty) {
            return;
        }
        previewSyncState.applyingMarkdown = true;
        try {
            if (vditor.getValue() !== markdown) {
                vditor.setValue(markdown);
            }
            fileValue = markdown;
            initError = false;
            previewSyncState.lastAppliedContentVersion = contentVersion;
            syncedTip(true, markdown);
            setPreviewDirtyState(false, "programmatic");
            window.setPreviewEditable(window.previewEditable);
            schedulePreviewRendered(contentVersion);
        } finally {
            setTimeout(function () {
                previewSyncState.applyingMarkdown = false;
            }, 0);
        }
    }

    /**
     * 统一同步当前模式节点的 contenteditable，避免模式切换或刷新后丢失只读态。
     */
    function applyCurrentModeEditableState(editable) {
        const currentModeElement = getCurrentModeElement();
        if (!currentModeElement) {
            return;
        }
        currentModeElement.setAttribute("contenteditable", editable ? "true" : "false");
    }

    /**
     * IR 模式会在点击后给节点加上展开态 class，从而露出 ### 等 Markdown 标记。
     * 只读态下需要主动清理这些 class，保持预览语义而不是编辑语义。
     */
    function collapseReadonlyExpandedNodes() {
        const currentModeElement = getCurrentModeElement();
        if (!currentModeElement) {
            return;
        }
        const expandedNodes = currentModeElement.querySelectorAll(".vditor-ir__node--expand");
        expandedNodes.forEach(function (node) {
            node.classList.remove("vditor-ir__node--expand");
        });
    }

    /**
     * 同步项目自管的只读视觉状态。
     */
    function syncPreviewReadonlyClass(editable) {
        const previewRootElement = getPreviewRootElement();
        if (!previewRootElement) {
            return;
        }
        previewRootElement.classList.toggle("preview-readonly", !editable);
        if (!editable) {
            collapseReadonlyExpandedNodes();
        }
    }

    /**
     * 只读态的编辑模式节点可能会在模式切换后被 Vditor 重建，延迟重放可编辑状态最稳妥。
     */
    function refreshPreviewEditableState() {
        setTimeout(function () {
            clearUserScrollIntent("refreshPreviewEditableState");
            beginProgrammaticViewportEpoch("refreshPreviewEditableState");
            previewSyncState.suppressSyntheticViewportUntil = Date.now() + 220;
            window.setPreviewEditable(window.previewEditable);
            schedulePreviewSyncArtifactsRebuild("editModeChanged");
        }, 0);
    }

    /**
     * 绑定只读态的交互守卫。
     * 这里不阻断文本选择和复制，只在交互完成后收口 IR 展开态，并拦截异常的 beforeinput。
     */
    function bindReadonlyInteractionGuards() {
        const previewRootElement = getPreviewRootElement();
        if (!previewRootElement || previewRootElement.dataset.previewReadonlyGuardBound === "true") {
            return;
        }
        previewRootElement.dataset.previewReadonlyGuardBound = "true";
        const readonlyNormalizeHandler = function (event) {
            if (window.previewEditable) {
                return;
            }
            if (event.type === "beforeinput") {
                event.preventDefault();
                return;
            }
            setTimeout(function () {
                collapseReadonlyExpandedNodes();
            }, 0);
        };
        previewRootElement.addEventListener("click", readonlyNormalizeHandler, true);
        previewRootElement.addEventListener("dblclick", readonlyNormalizeHandler, true);
        previewRootElement.addEventListener("beforeinput", readonlyNormalizeHandler, true);
    }

    function initToolbarExtensions() {
        if (!vditor || !vditor.vditor || !vditor.vditor.toolbar || !vditor.vditor.toolbar.elements) {
            return;
        }
        const toolbarElements = vditor.vditor.toolbar.elements;
        const exportElement = toolbarElements.export;
        if (exportElement) {
            const exportHints = exportElement.querySelectorAll(".vditor-hint");
            if (exportHints.length > 0) {
                exportHints[0].innerHTML = "<button onclick='exportFile(\"pdf\")'>PDF</button>\n<button onclick='exportFile(\"html\")'>HTML</button>";
            }
        }
        const infoElement = toolbarElements.info;
        if (infoElement) {
            const infoButtons = infoElement.querySelectorAll("button");
            if (infoButtons.length > 0) {
                const infoHtml = infoButtons[0].outerHTML;
                infoButtons[0].remove();
                infoElement.innerHTML = infoHtml;
                const rebuiltButtons = infoElement.querySelectorAll("button");
                if (rebuiltButtons.length > 0) {
                    rebuiltButtons[0].onclick = function () {
                        vditor.vditor.tip.show(document.getElementById("editorInfo").innerHTML, 0);
                    };
                }
            }
        }
        const editModeElement = toolbarElements["edit-mode"];
        if (editModeElement && editModeElement.dataset.previewEditableRefreshBound !== "true") {
            editModeElement.dataset.previewEditableRefreshBound = "true";
            editModeElement.addEventListener("click", function () {
                refreshPreviewEditableState();
            });
        }
    }

    // 运行时只切换工具栏容器显隐，避免重建整个 Vditor 实例导致光标和编辑状态丢失。
    window.setPreviewToolbarVisible = function (visible) {
        const toolbarElement = getToolbarElement();
        if (!toolbarElement) {
            return;
        }
        toolbarElement.style.display = visible ? "" : "none";
    }

    window.setPreviewEditable = function (editable) {
        window.previewEditable = editable;
        if (!vditor || !vditor.vditor || !vditor.vditor.currentMode) {
            return;
        }
        clearUserScrollIntent("setPreviewEditable");
        beginProgrammaticViewportEpoch("setPreviewEditable");
        previewSyncState.suppressSyntheticViewportUntil = Date.now() + 220;
        debugPreviewSync("set preview editable", {editable: editable});
        if (editable) {
            vditor.enable();
        } else {
            vditor.disabled();
        }
        applyCurrentModeEditableState(editable);
        syncPreviewReadonlyClass(editable);
        schedulePreviewSyncArtifactsRebuild("editableChanged");
    }

    window.markdownEditorBridge = {
        handleHostMessage(message) {
            if (!message) {
                return;
            }
            if (message.filePath && message.filePath !== previewSyncState.currentFilePath) {
                return;
            }
            switch (message.type) {
                case "applyMarkdown":
                    applyMarkdownFromHost(message);
                    break;
                case "revealSourceLine":
                    revealSourceLine(
                        message.payload ? message.payload.line : 0,
                        message.payload ? message.payload.topRatio : 0,
                        message.payload ? message.payload.reason : "programmatic"
                    );
                    break;
                default:
                    break;
            }
        }
    }

    function exportFile(type) {
        let options = {
            mode: "light",
            anchor: 2,
            lang: vditor.vditor.options.lang,
            hljs: vditor.vditor.options.preview.hljs,
            speech: {enable: false},
            math: vditor.vditor.options.preview.math,
            cdn: vditor.vditor.options.cdn,
            markdown: vditor.vditor.options.preview.markdown,
            theme: vditor.vditor.options.preview.theme,
            icon: vditor.vditor.options.icon
        }
        options.theme.current = "idea-light";
        Vditor.md2html(vditor.getValue(), options).then((content) => {
            let html = "<html>"
                + "<head>"
                + "<meta charset=\"utf-8\" />"
                + "<link rel=\"stylesheet\" type=\"text/css\" href=\"" + options.cdn + "/dist/index.css\"/>"
                + "<script src=\"" + options.cdn + "/dist/js/i18n/" + options.lang + ".js\"><\/script>"
                + "<script src=\"" + options.cdn + "/dist/method.min.js\"><\/script>"
                + "</head>"
                + "<body style=\"width: 1075px;\">"
                + "<div class=\"vditor-reset\" id=\"preview\">" + content + "</div>"
                + "<script>"
                + "    const previewElement = document.getElementById('preview');"
                + "    Vditor.setContentTheme('" + options.theme.current + "', '" + options.theme.path + "');"
                + "    Vditor.codeRender(previewElement);"
                + "    Vditor.highlightRender(" + JSON.stringify(options.hljs) + ", previewElement, '" + options.cdn + "');"
                + "    Vditor.mathRender(previewElement, { cdn: '" + options.cdn + "',math: " + JSON.stringify(options.math) + "});"
                + "    Vditor.mermaidRender(previewElement, '" + options.cdn + "', '" + options.mode + "');"
                + "    Vditor.flowchartRender(previewElement, '" + options.cdn + "');"
                + "    Vditor.graphvizRender(previewElement, '" + options.cdn + "');"
                + "    Vditor.chartRender(previewElement, '" + options.cdn + "', '" + options.mode + "');"
                + "    Vditor.mindmapRender(previewElement, '" + options.cdn + "', '" + options.mode + "');"
                + "    Vditor.abcRender(previewElement, '" + options.cdn + "');"
                + "    Vditor.mediaRender(previewElement);"
                + "    Vditor.speechRender(previewElement);"
                + " <\/script> "
                + " <script src=\"" + options.cdn + "/dist/js/icons/" + options.icon + ".js\"><\/script>"
                + "</body></html>";

            $.post(exportUrl, {
                "value": html,
                "type": type,
                "cdn": options.cdn,
                "themeCdn": options.theme.path
            }, function (data) {
                if (data.success === false) {
                    vditor.tip("Failed to Export file", 0);
                }
            }).fail(function () {
                vditor.tip("Save file request error", 0);
            })
        });
    }

    const vditor = new Vditor('vditor', {
        "theme": darcula ? "dark" : "light",
        "height": document.documentElement.clientHeight,
        "lang": "{{Lang}}",
        "cache": {
            "enable": false
        },
        "toolbar": [
            {"name": "emoji", "tipPosition": "s"},
            {"name": "headings", "tipPosition": "s"},
            {"name": "bold", "tipPosition": "s"},
            {"name": "italic", "tipPosition": "s"},
            {"name": "strike", "tipPosition": "s"},
            {"name": "link", "tipPosition": "s"},
            "|",
            {"name": "list", "tipPosition": "s"},
            {"name": "ordered-list", "tipPosition": "s"},
            {"name": "check", "tipPosition": "s"},
            {"name": "outdent", "tipPosition": "s"},
            {"name": "indent", "tipPosition": "s"},
            "|",
            {"name": "quote", "tipPosition": "s"},
            {"name": "line", "tipPosition": "s"},
            {"name": "code", "tipPosition": "s"},
            {"name": "inline-code", "tipPosition": "s"},
            {"name": "insert-before", "tipPosition": "s"},
            {"name": "insert-after", "tipPosition": "s"},
            {"name": "table", "tipPosition": "s"},
            {"name": "upload", "tipPosition": "s"},
            "|",
            {"name": "undo", "tipPosition": "s"},
            {"name": "redo", "tipPosition": "s"},
            {
                "name": "format",
                "tip": "format",
                "tipPosition": "s",
                "icon": document.getElementById("format").innerHTML,
                click() {
                    editBlur(vditor.getValue(),true)
                }
            },
            "|",
            {"name": "edit-mode", "tipPosition": "w"},
            {
                "name": "donate",
                "tip": "donate",
                "tipPosition": "s",
                "icon": document.getElementById("donate").innerHTML,
                click() {
                    window.open("https://shuzijun.com/donate.html");
                }
            },
            {
                name: "more",
                toolbar: [
                    "both",
                    "code-theme",
                    "content-theme",
                    "outline",
                    "preview",
                    "devtools",
                    "export",
                    "info"
                ],
            },
        ],
        "toolbarConfig": {"pin": true},
        "cdn": vditorCDN,
        "preview": {
            "theme": {
                "current": darcula ? "idea-dark" : "idea-light",
                "path": vditorThemeCDN
            },
            "markdown": {
                "sanitize": false
            },
            "maxWidth": $(window).width() - 100,
            "actions": ["desktop", "tablet", "mobile"],
            "hljs": {"style": darcula ? "dracula" : "github"},
            "math": {
                "inlineDigit": true
            }
        },
        "counter": {
            "enable": true
        },
        "upload": {
            "url": uploadUrl,
            format(files, responseText) {
                saveTime = Date.now() + 5000;
                return responseText;
            }
        },
        "value": initValue(),
        after() {
            fileValue = vditor.getValue()
            bindReadonlyInteractionGuards();
            bindPreviewSyncListeners();
            initToolbarExtensions();
            window.setPreviewToolbarVisible(previewToolbarVisible);
            window.setPreviewEditable(previewEditable);
            schedulePreviewSyncArtifactsRebuild("after");
            emitPreviewSyncMessage("previewReady", {}, "activation", previewSyncState.lastAppliedContentVersion);
            emitPreviewSyncMessage("previewDirtyChanged", {dirty: false}, "programmatic", previewSyncState.lastAppliedContentVersion);
        },
        blur(md) {
            editBlur(md,false)
        },
        focus(md) {
            editFocus(md)
        },
        input(md) {
            editInput(md)
        }
    });

    function updateStyle(style, darcula) {
        let newStyle = document.createElement('style');
        newStyle.id = 'ideaStyle';
        newStyle.innerHTML = style;
        let oldStyle = document.getElementById('ideaStyle');
        oldStyle.parentNode.replaceChild(newStyle, oldStyle);
        vditor.setTheme(darcula ? "dark" : "light", darcula ? "idea-dark" : "idea-light", darcula ? "dracula" : "github", vditorThemeCDN)
    }


    function updateHeight(width, height) {
        setTimeout(function (width, height) {
            if (window.innerHeight < height) {
                return
            }
            let vditorDom = document.getElementById('vditor');
            vditorDom.style.paddingTop = (window.innerHeight - height) + "px";
        }, 500, width, height)
    }
</script>
<script>
    {{injectScript}}
</script>
{{ideStyle}}
</html>
